name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Run unit tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); session_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_session_eval_v21.txt', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v21.txt'], text=True); assert 'passed=9' in session_eval and 'expect_pass=false' not in session_eval, session_eval; uncertain = subprocess.check_output([str(exe), 'chat-demo', 'tell me a joke', '160', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v21.txt'], text=True); assert 'not sure' in uncertain.lower(), uncertain; version_guard = subprocess.check_output([str(exe), 'chat-demo', 'what should v22 improve', '160', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v21.txt'], text=True); assert 'not sure' in version_guard.lower(), version_guard"
