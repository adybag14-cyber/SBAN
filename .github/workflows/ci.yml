name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Run unit tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); common = ['mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v26.txt', 'open_seed_path=data/sban_dialogue_open_seed_v26.txt']; session_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_session_eval_v26.txt', *common], text=True); assert 'passed=37' in session_eval and 'expect_pass=false' not in session_eval, session_eval; open_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_open_chat_session_eval_v26.txt', *common], text=True); assert 'passed=50' in open_eval and 'expect_pass=false' not in open_eval, open_eval; broad_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_broad_chat_session_eval_v26.txt', *common], text=True); assert 'passed=40' in broad_eval and 'expect_pass=false' not in broad_eval, broad_eval; overview = subprocess.check_output([str(exe), 'chat-demo', 'what is SBAN v26', '180', *common], text=True); assert 'v26' in overview.lower() and 'after v25' in overview.lower(), overview; bundle = subprocess.check_output([str(exe), 'chat-demo', 'what files ship in the bundle', '180', *common], text=True); assert 'sban_v26_repo.zip' in bundle.lower(), bundle; dns = subprocess.check_output([str(exe), 'chat-demo', 'what is dns', '180', *common], text=True); assert 'domain name system' in dns.lower(), dns; zig = subprocess.check_output([str(exe), 'chat-demo', 'where is std.hashmap implemented in zig upstream', '180', *common], text=True); assert 'lib/std/hash_map.zig' in zig.lower(), zig; noise = subprocess.check_output([str(exe), 'chat-demo', 'blorple zint protocol', '180', *common], text=True); assert 'not sure' in noise.lower(), noise"

