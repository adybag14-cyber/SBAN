name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Run unit tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); session_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_session_eval_v23_5.txt', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'passed=23' in session_eval and 'expect_pass=false' not in session_eval, session_eval; overview = subprocess.check_output([str(exe), 'chat-demo', 'what is SBAN v23.5', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'v23.5' in overview.lower(), overview; paper = subprocess.check_output([str(exe), 'chat-demo', 'where is the v23.5 paper pdf', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'sban_v23_5_follow_up_research_paper.pdf' in paper.lower(), paper; numeric = subprocess.check_output([str(exe), 'chat-demo', 'what command shows numeric cuda support', '220', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'numeric-accel-info' in numeric.lower(), numeric; rtx = subprocess.check_output([str(exe), 'chat-demo', 'can this run on an rtx 4090', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'cuda' in rtx.lower(), rtx; joke = subprocess.check_output([str(exe), 'chat-demo', 'tell me a joke', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'not sure' not in joke.lower(), joke; noise = subprocess.check_output([str(exe), 'chat-demo', 'blorple zint protocol', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23_5.txt'], text=True); assert 'not sure' in noise.lower(), noise"

