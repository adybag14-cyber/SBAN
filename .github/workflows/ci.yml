name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Run unit tests
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); session = pathlib.Path('ci_session_v20.txt'); session.unlink(missing_ok=True); subprocess.run([str(exe), 'chat-demo', 'hi im tom', '160', 'mode=free', 'seed_path=data/sban_dialogue_seed_v20.txt', f'session_path={session}'], check=True); subprocess.run([str(exe), 'chat-demo', 'can you recall my name', '160', 'mode=free', 'seed_path=data/sban_dialogue_seed_v20.txt', f'session_path={session}'], check=True); subprocess.run([str(exe), 'chat-demo', 'what is 2 + 2', '160', 'mode=free', 'seed_path=data/sban_dialogue_seed_v20.txt'], check=True); session.unlink(missing_ok=True)"
