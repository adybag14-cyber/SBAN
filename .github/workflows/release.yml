name: Release Demo Bundles

on:
  push:
    tags:
      - "v23*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  package-demo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_x86_64
            binary: zig-out/bin/zig_sban
          - os: windows-latest
            platform: windows_x86_64
            binary: zig-out/bin/zig_sban.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build and test
        run: |
          zig build test
          zig build -Doptimize=ReleaseFast

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); session_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_session_eval_v23.txt', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23.txt'], text=True); assert 'passed=21' in session_eval and 'expect_pass=false' not in session_eval, session_eval; overview = subprocess.check_output([str(exe), 'chat-demo', 'what is SBAN v23', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23.txt'], text=True); assert 'v23' in overview.lower(), overview; paper = subprocess.check_output([str(exe), 'chat-demo', 'where is the v23 paper pdf', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23.txt'], text=True); assert 'sban_v23_follow_up_research_paper.pdf' in paper.lower(), paper; rtx = subprocess.check_output([str(exe), 'chat-demo', 'can this run on an rtx 4090', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23.txt'], text=True); assert 'cuda' in rtx.lower(), rtx; joke = subprocess.check_output([str(exe), 'chat-demo', 'tell me a joke', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23.txt'], text=True); assert 'not sure' not in joke.lower(), joke; noise = subprocess.check_output([str(exe), 'chat-demo', 'blorple zint protocol', '180', 'mode=free', 'allow_generation=true', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v23.txt'], text=True); assert 'not sure' in noise.lower(), noise"

      - name: Package demo bundle
        run: |
          python scripts/package_v23_demo.py --binary ${{ matrix.binary }} --platform ${{ matrix.platform }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-demo
          path: deliverables/v23/demo/SBAN_v23_${{ matrix.platform }}_demo.zip

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes
          }

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "deliverables/v23/demo/SBAN_v23_${{ matrix.platform }}_demo.zip" --clobber
