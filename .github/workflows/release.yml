name: Release Demo Bundles

on:
  push:
    tags:
      - "v22*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  package-demo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_x86_64
            binary: zig-out/bin/zig_sban
          - os: windows-latest
            platform: windows_x86_64
            binary: zig-out/bin/zig_sban.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build and test
        run: |
          zig build test
          zig build -Doptimize=ReleaseFast

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); session_eval = subprocess.check_output([str(exe), 'chat-session-eval', 'data/sban_session_eval_v22.txt', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v22.txt'], text=True); assert 'passed=18' in session_eval and 'expect_pass=false' not in session_eval, session_eval; uncertain = subprocess.check_output([str(exe), 'chat-demo', 'tell me a joke', '160', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v22.txt'], text=True); assert 'not sure' in uncertain.lower(), uncertain; version_guard = subprocess.check_output([str(exe), 'chat-demo', 'what should v23 improve', '160', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v22.txt'], text=True); assert 'not sure' in version_guard.lower(), version_guard; bridge = subprocess.check_output([str(exe), 'chat-demo', 'what is bridge memory', '160', 'backend=cpu', 'seed_path=data/sban_dialogue_seed_v22.txt'], text=True); assert 'context bridge' in bridge.lower(), bridge"

      - name: Package demo bundle
        run: |
          python scripts/package_v22_demo.py --binary ${{ matrix.binary }} --platform ${{ matrix.platform }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-demo
          path: deliverables/v22/demo/SBAN_v22_${{ matrix.platform }}_demo.zip

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes
          }

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "deliverables/v22/demo/SBAN_v22_${{ matrix.platform }}_demo.zip" --clobber
