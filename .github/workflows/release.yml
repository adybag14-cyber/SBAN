name: Release Demo Bundles

on:
  push:
    tags:
      - "v20*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  package-demo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_x86_64
            binary: zig-out/bin/zig_sban
          - os: windows-latest
            platform: windows_x86_64
            binary: zig-out/bin/zig_sban.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build and test
        run: |
          zig build test
          zig build -Doptimize=ReleaseSafe

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); session = pathlib.Path('release_session_v20.txt'); session.unlink(missing_ok=True); subprocess.run([str(exe), 'chat-demo', 'hi im tom', '160', 'mode=free', 'seed_path=data/sban_dialogue_seed_v20.txt', f'session_path={session}'], check=True); subprocess.run([str(exe), 'chat-demo', 'can you recall my name', '160', 'mode=free', 'seed_path=data/sban_dialogue_seed_v20.txt', f'session_path={session}'], check=True); subprocess.run([str(exe), 'chat-demo', 'what is 2 + 2', '160', 'mode=free', 'seed_path=data/sban_dialogue_seed_v20.txt'], check=True); session.unlink(missing_ok=True)"

      - name: Package demo bundle
        run: |
          python scripts/package_v20_demo.py --binary ${{ matrix.binary }} --platform ${{ matrix.platform }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-demo
          path: deliverables/v20/demo/SBAN_v20_${{ matrix.platform }}_demo.zip

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes
          }

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "deliverables/v20/demo/SBAN_v20_${{ matrix.platform }}_demo.zip" --clobber
