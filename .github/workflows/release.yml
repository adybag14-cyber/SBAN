name: Release Demo Bundles

on:
  push:
    tags:
      - "v34*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  package-demo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_x86_64
            binary: zig-out/bin/zig_sban
          - os: windows-latest
            platform: windows_x86_64
            binary: zig-out/bin/zig_sban.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build and test
        run: |
          zig build test
          python -m py_compile scripts/build_v34_runtime_prewarm.py scripts/vocab_size_probe_v34.py scripts/ci_smoke_v34.py scripts/package_v34_demo.py
          python scripts/build_v34_runtime_prewarm.py
          python scripts/vocab_size_probe_v34.py
          zig build -Doptimize=ReleaseFast

      - name: Smoke demo
        run: python scripts/ci_smoke_v34.py

      - name: Package demo bundle
        run: |
          python scripts/package_v34_demo.py --binary ${{ matrix.binary }} --platform ${{ matrix.platform }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-demo
          path: deliverables/v34/demo/SBAN_v34_${{ matrix.platform }}_demo.zip

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes
          }

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "deliverables/v34/demo/SBAN_v34_${{ matrix.platform }}_demo.zip" --clobber
