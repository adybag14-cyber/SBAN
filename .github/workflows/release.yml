name: Release Demo Bundles

on:
  push:
    tags:
      - "v19*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-demo:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux_x86_64
            binary: zig-out/bin/zig_sban
          - os: windows-latest
            platform: windows_x86_64
            binary: zig-out/bin/zig_sban.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.87+9b177a7d2

      - name: Build and test
        run: |
          zig build test
          zig build -Doptimize=ReleaseSafe

      - name: Smoke demo
        run: |
          python -c "import os, pathlib, subprocess; exe = pathlib.Path('zig-out/bin/zig_sban.exe' if os.name == 'nt' else 'zig-out/bin/zig_sban'); subprocess.run([str(exe), 'chat-demo', 'what is the release message', '160', 'seed_path=data/sban_dialogue_seed_v19.txt'], check=True)"

      - name: Package demo bundle
        run: |
          python scripts/package_v19_demo.py --binary ${{ matrix.binary }} --platform ${{ matrix.platform }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-demo
          path: deliverables/v19/demo/SBAN_v19_${{ matrix.platform }}_demo.zip

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --generate-notes
          }

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "deliverables/v19/demo/SBAN_v19_${{ matrix.platform }}_demo.zip" --clobber
