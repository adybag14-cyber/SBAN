name: V26 Release Suite

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label for the full v26 release suite
        required: false
        default: ubuntu-latest
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-release-suite:
    runs-on: ${{ inputs.runner_label || 'ubuntu-latest' }}
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build and unit test
        run: |
          zig build test
          python -m py_compile scripts/build_v26_open_seed.py scripts/run_v26_release.py scripts/make_v26_deliverables.py scripts/package_v26_demo.py scripts/run_v26_100m_ci.py

      - name: Run full v26 release suite
        run: python scripts/run_v26_release.py

      - name: Generate v26 deliverables
        run: python scripts/make_v26_deliverables.py

      - name: Upload v26 release results
        uses: actions/upload-artifact@v4
        with:
          name: v26-release-results
          path: docs/results/v26
          if-no-files-found: error

      - name: Upload v26 deliverables
        uses: actions/upload-artifact@v4
        with:
          name: v26-deliverables
          path: |
            deliverables/v26
            SBAN_v26_EXECUTIVE_SUMMARY.md
            SBAN_v26_REPORT.md
            docs/papers/SBAN_v26_follow_up_research_paper.pdf
          if-no-files-found: error
