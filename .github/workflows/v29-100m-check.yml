name: v29 100M Check

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label for the 100M attempt
        required: false
        default: ubuntu-latest
        type: string
      numeric_backend:
        description: Numeric backend for the 100M attempt
        required: false
        default: cpu
        type: choice
        options:
          - cpu
          - cpu_mt
      score_threads:
        description: score_threads override when numeric_backend=cpu_mt
        required: false
        default: "4"
        type: string
      timeout_minutes:
        description: Soft timeout applied with GNU timeout before artifact upload
        required: false
        default: "210"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-100m:
    runs-on: ${{ inputs.runner_label || 'ubuntu-latest' }}
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build release binary
        run: |
          zig build test
          zig build -Doptimize=ReleaseFast
          python -m py_compile scripts/host_monitor.py scripts/run_v29_100m_ci.py

      - name: Capture runner baseline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/results/v29
          {
            echo "timestamp_utc=$(date -u --iso-8601=seconds)"
            echo "runner_name=${RUNNER_NAME:-unknown}"
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "runner_label=${{ inputs.runner_label || 'ubuntu-latest' }}"
            echo
            echo "== uname =="
            uname -a
            echo
            echo "== cpu =="
            nproc
            lscpu || true
            echo
            echo "== memory =="
            free -h || true
            echo
            echo "== disk =="
            df -h || true
            echo
            echo "== ulimit =="
            ulimit -a || true
            echo
            for path in /sys/fs/cgroup/memory.current /sys/fs/cgroup/memory.max /sys/fs/cgroup/memory.events; do
              if [[ -f "$path" ]]; then
                echo "== $path =="
                cat "$path"
                echo
              fi
            done
          } | tee docs/results/v29/_runner_baseline_100m.txt

      - name: Attempt near-100M hardening run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/results/v29
          echo "completed=false" > docs/results/v29/longrun_v29_100m_ci_status.txt
          echo "numeric_backend=${{ inputs.numeric_backend }}" >> docs/results/v29/longrun_v29_100m_ci_status.txt
          echo "score_threads=${{ inputs.score_threads }}" >> docs/results/v29/longrun_v29_100m_ci_status.txt
          echo "runner_label=${{ inputs.runner_label || 'ubuntu-latest' }}" >> docs/results/v29/longrun_v29_100m_ci_status.txt
          if timeout "${{ inputs.timeout_minutes }}m" python scripts/run_v29_100m_ci.py --skip-build --numeric-backend "${{ inputs.numeric_backend }}" --score-threads "${{ inputs.score_threads }}" 2>&1 | tee docs/results/v29/_run_v29_100m_ci.log; then
            echo "completed=true" >> docs/results/v29/longrun_v29_100m_ci_status.txt
          else
            echo "completed=false" >> docs/results/v29/longrun_v29_100m_ci_status.txt
            echo "note=timed_out_or_failed_before_completion" >> docs/results/v29/longrun_v29_100m_ci_status.txt
          fi

      - name: Capture runner postmortem
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p docs/results/v29
          {
            echo "timestamp_utc=$(date -u --iso-8601=seconds)"
            echo "job_status=${{ job.status }}"
            echo
            echo "== memory =="
            free -h || true
            echo
            echo "== disk =="
            df -h || true
            echo
            echo "== top resident processes =="
            ps -eo pid,ppid,pcpu,pmem,rss,vsz,etimes,cmd --sort=-rss | head -n 40 || true
            echo
            for path in /sys/fs/cgroup/memory.current /sys/fs/cgroup/memory.max /sys/fs/cgroup/memory.events; do
              if [[ -f "$path" ]]; then
                echo "== $path =="
                cat "$path"
                echo
              fi
            done
          } | tee docs/results/v29/_runner_postmortem_100m.txt

      - name: Upload 100M attempt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v29-100m-attempt
          path: |
            docs/results/v29/_run_v29_100m_ci.log
            docs/results/v29/_run_v29_100m_ci_heartbeat.jsonl
            docs/results/v29/_runner_baseline_100m.txt
            docs/results/v29/_runner_postmortem_100m.txt
            docs/results/v29/longrun_v29_100m_ci_status.txt
            docs/results/v29/longrun_v29_100m_ci_summary.json
            docs/results/v29/longrun_v29_100m_ci_cpu.json
            docs/results/v29/longrun_v29_100m_ci_cpu_mt.json
          if-no-files-found: warn
