name: v36 Release Suite

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Runner label for the core v36 release suite
        required: false
        default: ubuntu-latest
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-release-suite:
    runs-on: ${{ inputs.runner_label || 'ubuntu-latest' }}
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zig
        run: python scripts/install_zig_ci.py --version master --output-dir .ci-tools/zig

      - name: Build and unit test
        run: |
          zig build test
          python -m py_compile scripts/build_v36_runtime_prewarm.py scripts/vocab_size_probe_v36.py scripts/ci_smoke_v36.py scripts/host_monitor.py scripts/run_v36_release.py scripts/make_v36_deliverables.py scripts/package_v36_demo.py scripts/run_v36_100m_ci.py

      - name: Capture runner baseline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/results/v36
          {
            echo "timestamp_utc=$(date -u --iso-8601=seconds)"
            echo "runner_name=${RUNNER_NAME:-unknown}"
            echo "runner_os=${RUNNER_OS:-unknown}"
            echo "runner_arch=${RUNNER_ARCH:-unknown}"
            echo "runner_label=${{ inputs.runner_label || 'ubuntu-latest' }}"
            echo
            echo "== uname =="
            uname -a
            echo
            echo "== cpu =="
            nproc
            lscpu || true
            echo
            echo "== memory =="
            free -h || true
            echo
            echo "== disk =="
            df -h || true
            echo
            echo "== ulimit =="
            ulimit -a || true
            echo
            for path in /sys/fs/cgroup/memory.current /sys/fs/cgroup/memory.max /sys/fs/cgroup/memory.events; do
              if [[ -f "$path" ]]; then
                echo "== $path =="
                cat "$path"
                echo
              fi
            done
          } | tee docs/results/v36/_runner_baseline_release_suite.txt

      - name: Run hosted-compatible v36 release suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/results/v36
          python scripts/run_v36_release.py --skip-cuda --benchmarks prefix,drift,probe,long_250k,long_1m 2>&1 | tee docs/results/v36/_run_v36_release_suite_ci.log

      - name: Capture runner postmortem
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p docs/results/v36
          {
            echo "timestamp_utc=$(date -u --iso-8601=seconds)"
            echo "job_status=${{ job.status }}"
            echo
            echo "== memory =="
            free -h || true
            echo
            echo "== disk =="
            df -h || true
            echo
            echo "== top resident processes =="
            ps -eo pid,ppid,pcpu,pmem,rss,vsz,etimes,cmd --sort=-rss | head -n 40 || true
            echo
            for path in /sys/fs/cgroup/memory.current /sys/fs/cgroup/memory.max /sys/fs/cgroup/memory.events; do
              if [[ -f "$path" ]]; then
                echo "== $path =="
                cat "$path"
                echo
              fi
            done
          } | tee docs/results/v36/_runner_postmortem_release_suite.txt

      - name: Upload v36 release results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v36-release-results
          path: docs/results/v36
          if-no-files-found: error
